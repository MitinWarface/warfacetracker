version: '3.8'

services:
  # ===========================================
  # WARFACE TRACKER APP
  # ===========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 20
    container_name: warface-tracker
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/warface_tracker
      - REDIS_URL=redis://redis:6379
      - APP_SECRET=${APP_SECRET:-change-me-in-production}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - warface-network
    volumes:
      - app-data:/app/data

  # ===========================================
  # POSTGRESQL DATABASE
  # ===========================================
  db:
    image: postgres:15-alpine
    container_name: warface-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=warface_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - warface-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # REDIS CACHE
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: warface-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - warface-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # PRISMA STUDIO (Optional)
  # ===========================================
  prisma-studio:
    image: node:20-alpine
    container_name: warface-prisma-studio
    working_dir: /app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/warface_tracker
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install -g prisma && npx prisma studio --hostname 0.0.0.0 --port 5555"
    ports:
      - "5555:5555"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - warface-network
    profiles:
      - dev

networks:
  warface-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  app-data:
